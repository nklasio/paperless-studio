name: Feature request
description: Propose a focused improvement to Paperless Studio
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow is difficult today, and for whom?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful version of the change.
    validations:
      required: true
  - type: textarea
    id: paperless
    attributes:
      label: Paperless integration
      description:
        Note relevant paperless-ngx API behavior, permissions, or configuration.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be interested in implementing this.

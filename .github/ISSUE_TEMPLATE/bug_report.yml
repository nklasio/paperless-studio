name: Bug report
description: Report a reproducible problem in Paperless Studio
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Remove API tokens and private document data from everything you share.
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open…
        2. Select…
        3. See…
    validations:
      required: true
  - type: input
    id: paperless-version
    attributes:
      label: paperless-ngx version
      placeholder: "For example: 2.x"
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: "For example: Safari 18"
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: Studio deployment
      options:
        - Local npm development server
        - Docker Compose local build
        - Other
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add sanitized logs or screenshots. Do not include document contents unless they are synthetic.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed API tokens, personal data, and private document contents.
          required: true
